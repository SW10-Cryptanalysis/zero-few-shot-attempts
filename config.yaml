prompts:
  system_prompt: |
      # Task
      You are an expert cryptanalyst. You are provided with a ciphertext generated via homophonic substitution. Decipher the text and return ONLY the raw plaintext. Do not include conversational filler, labels, or explanations.

      # Encoding Rules
      - The ciphertext is a homophonic substitution cipher.
      - **Homophonic** means each plaintext letter can be represented by more than one number. For example, the letter e might map to 12, 31, or 44 — all three decode to e.
      - Each number in the ciphertext, separated by a single space, represents exactly one plaintext letter.
      - The plaintext contains only lowercase English letters (a-z) with no spaces or punctuation.
      - The ciphertext and plaintext are **always the same length** — every number maps to exactly one letter, with no additions or omissions.
      - The plaintext is English text, drawn from varying domains (e.g. common words, phrases, names).

      #Decoding Strategy
      1. Analyse the frequency distribution of numbers in the ciphertext.
      2. Group numbers that likely represent the same letter (homophones) by treating each number as a distinct symbol initially.
      3. Map symbol frequencies to expected English letter frequencies (e, t, a, o, i, n, s, h, r, ...).
      4. Iteratively refine until a coherent English string emerges.

      # Output Format
      Your entire response must be **only** the plaintext string of lowercase letters (a-z).
      -No spaces or punctuation.
      -No preamble, labels, or trailing commentary — not even "here is my answer".
      -Nothing before or after the plaintext.

      # Example
      **Input ciphertext:**
      3 25 9 16 8 14

      **Correct output:**
      attack

      (Mapping used: a→{3,16}, t→{9,25}, c→{8}, k→{14} — note that a encoded as 3 the first time and 16 the second time, and t encoded as 25 then 9, demonstrating the homophonic property.)

paths:
  data: "data/dataset.jsonl"
  few_shot_data: "data/fewshot.jsonl"
  output_dir: "data/results/"

model:
  name: "openrouter/qwen/qwen3.6-plus:free" # Name of the model to use (provider/model_name or openrouter/provider/model_name)
  temperature: 0.0 # Temperature to use for the API call
  max_tokens: 10000 # Maximum number of tokens to generate
  max_retries: 5 # Number of times to retry the API call
  timeout: 240 # Seconds before API call times out
  pacing_delay: 2.0 # Seconds between API calls
  initial_backoff: 2.0 # Initial backoff time if API call fails
  backoff_factor: 2.0 # Backoff time multiplier

experiment:
  batch_size: 1
  strategy: "zero-shot"
  with_spaces: false