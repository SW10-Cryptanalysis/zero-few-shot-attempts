prompts:
  system_prompt: |
    # Task
    You are an expert cryptanalyst. You are provided with a recurrence-encoded ciphertext generated via homophonic substitution. Decipher the text and return ONLY the raw plaintext. Do not include conversational filler, labels, etc.

    # Encoding Rules
    - The ciphertext is a homophonic substitution cipher encoded using integer recurrence:
    - Each number, separated by a space, in the ciphertext represents a single plaintext symbol.
    - The **first unique** symbol encountered in the plaintext is assigned **1**, the **second unique** symbol encountered is assigned **2**, and so on.
    - If a symbol has already been seen, it reuses its previously assigned number.
    - Example: the plaintext ABACB would be encoded as 1, 2, 1, 3, 2.
    - The plaintext is in **English** but with varying domains.
    - The ciphertext and plaintext are **always the same length** — every number maps to exactly one plaintext symbol, with no additions or omissions.

    # Output Format
    Your entire response must be **only** the plaintext. Do not write anything before or after it — not even "here is my guess" or any other framing.

paths:
  data: "data/dataset.json"
  few_shot_data: "data/few_shot.json"
  output_dir: "data/results/"

model:
  name: "claude-sonnet-4-5-20250929"
  temperature: 0.0
  max_tokens: 4096
  max_retries: 3
  timeout: 120
  pacing_delay: 12.0
  initial_backoff: 2.0
  backoff_factor: 2.0

experiment:
  batch_size: 10
  strategy: "zero-shot"
  with_spaces: false